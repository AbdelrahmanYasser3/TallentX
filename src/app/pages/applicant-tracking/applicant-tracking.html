<div class="min-h-screen bg-surface-container-lowest p-6 md:p-8">
  <div class="mx-auto max-w-7xl space-y-7">
    <header>
      <p class="text-label-md uppercase tracking-widest text-primary">Hiring Pipeline</p>
      <h1 class="mt-1 text-display-sm text-on-surface">Applicant Tracking</h1>
      <p class="mt-2 text-body-md text-on-surface-variant">Track every candidate from first review to final offer.</p>
    </header>

    <section class="grid grid-cols-1 gap-5 lg:grid-cols-4">
      <article *ngFor="let col of columns()" class="rounded-2xl bg-surface-container p-4">
        <div class="flex items-center justify-between">
          <h2 class="text-title-sm text-on-surface">{{ col.name }}</h2>
          <span 
            class="rounded-lg px-2 py-1 text-label-sm"
            [ngClass]="{
              'bg-primary-container text-on-primary-container': col.theme === 'primary',
              'bg-secondary-container text-on-secondary-container': col.theme === 'secondary',
              'bg-tertiary-container text-on-tertiary-container': col.theme === 'tertiary',
              'bg-success-container text-on-success-container': col.theme === 'success'
            }"
          >
            {{ col.count }}
          </span>
        </div>
        <div class="mt-4 space-y-3">
          <div *ngFor="let app of getApplicantsForColumn(col.id)" class="rounded-xl bg-surface-container-lowest p-3 ring-1 ring-outline-variant/20">
            <p class="text-label-md text-on-surface">{{ app.name }}</p>
            <p class="mt-1 text-body-sm text-on-surface-variant">{{ app.role }}</p>
          </div>
        </div>
      </article>
    </section>
  </div>
</div>
